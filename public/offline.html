<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>The River — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, system-ui, sans-serif;
      background: #F2F1ED;
      color: #1A1715;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
      padding: 2rem;
      text-align: center;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #0C0A09; color: #FAFAF9; }
    }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    p { color: #78716C; font-size: 0.9rem; margin-bottom: 1.5rem; }
    button {
      background: linear-gradient(135deg, rgba(59,130,246,0.9), rgba(30,64,175,0.95));
      color: white;
      border: none;
      padding: 0.75rem 2rem;
      border-radius: 999px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div>
    <div style="font-size: 3rem; margin-bottom: 1rem;">🌊</div>
    <h1>You're Offline</h1>
    <p>The River will flow again when you're back online.</p>
    <button onclick="location.reload()">Try Again</button>
  </div>
</body>
</html>
